menu: "Diagnostic → Check Codes"
target_ecu: "ALL ECUs on bus — sweep across SAAB manufacturer-alias
             addresses ($024X / $054X reply) plus OBD-II ($07E1 / $05E9)."
captured_from:
  shim_log: cstech2win_shim_20260513-114826.log
  range_ms: [37000, 56000]
  vehicle_profile: SAAB 9-3 (bench, 2017)
status: captured (full 2-pass DTC sweep over 17 ECUs with example payloads)
services:
  - 0x20  # ReturnToNormalOperation — per-ECU session reset before each DTC read
  - 0xA9  # ReadDiagnosticInformation (GMW3110 §9)
    # subfunction:
    #   0x81  ReadStatusOfDTCByStatusMask
    # masks observed:
    #   0x12  status & (active | test_failed_since_clear)
    #   0x10  status & confirmed/stored

# Two-pass sweep. Pass 1 (mask 0x12) probes a small subset of body modules.
# Pass 2 (mask 0x10) covers every ECU on the bus including OBD-II.
sweeps:
  - sweep: pass_1_mask_12
    mask: 0x12
    purpose: "Stored + recently-failed DTCs on body ECUs (subset)."
    ecus_in_order: [$024B, $024A, $0248, $0243]
  - sweep: pass_2_mask_10
    mask: 0x10
    purpose: "Confirmed DTCs across full bus, including OBD-II."
    ecus_in_order:
      - $0245
      - $0257
      - $0242
      - $0243
      - $0244
      - $0247
      - $0246
      - $0248
      - $0249
      - $024A
      - $024B
      - $025C
      - $025B
      - $024D
      - $07E1   # OBD-II TCM
      - $024F
      - $0241   # last — engine alias, takes ~1.5s before its terminator arrives

# Per-ECU protocol within each sweep pass:
per_ecu_steps:
  - step: 1_session_reset
    tx: [0x20]
    can_id: ${ECU}
    rx_pos: [0x60]
    rx_can_id: ${ECU + 0x400}   # e.g. $0243 → $0643
    timeout_ms: 300
    notes: |
      ReturnToNormalOperation. Closes any open security/diag session, putting
      the ECU into a known default state before the DTC read. Tech2Win
      issues this once per ECU per sweep pass.

  - step: 2_read_dtc_status
    tx: [0xA9, 0x81, "${mask}"]   # ${mask} = 0x12 or 0x10 depending on sweep
    can_id: ${ECU}
    rx:
      can_id: ${ECU + 0x300}      # e.g. $0243 → $0543 (single-frame DPID-style address)
      frame_format:
        byte_0: 0x81              # echo of subfunction
        bytes_1_3: dtc_code       # 3-byte GMW3110 DTC code
        byte_4: status_mask       # bitfield (see status_bits below)
        bytes_5_7: trailing       # 00 00 00 (typical) or ff ff ff
      delivery: "Each DTC arrives as its own single-frame.
                 Terminator is a frame with dtc_code = 00 00 00 and the sweep
                 mask echoed in byte 4."
    response_pending:
      can_id: ${ECU + 0x400}      # MF address — e.g. $0241 → $0641
      pattern: [0x7F, 0xA9, 0x78]
      observed_on: [$0241]
      typical_delay_ms: 1500
      notes: "Engine ECM at $0241 returns responsePending on $0641 before
              the actual SF frames on $0541 arrive. ~1.3s wait."
    timeout_ms: 2500

# DTC status byte (byte 4) interpretation per GMW3110 §9.3, transcribed
# from Trionic8.cs:GetDtcDescription comments (lines 4669-4676).
status_bits:
  0x01: DTCSupportedByCalibration
  0x02: currentDTC                       # active right now
  0x04: testNotPassedSinceDTCCleared
  0x08: testFailedSinceDTCCleared
  0x10: historyDTC                       # stored in EEPROM
  0x20: testNotPassedSinceCurrentPowerUp
  0x40: currentDTCSincePowerUp
  0x80: warningIndicatorRequestedState   # MIL request

# Observed bench responses (full snapshot from this capture).
# DTC names decoded via Trionic's algorithm — see dtc_byte_layout below.
# Descriptions and z90-attributed ECU sourced from z90.pl/saab/dtc/
