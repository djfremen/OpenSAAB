menu: "(synthetic — single $1A 81/82/90/9A walk across the bus)"
target_ecu: "ALL — broadcast each request CAN-ID in $024X, $064X, $07E0..$07E1"
captured_from:
  shim_log: cstech2win_1778807278859.log.gz
  range_ms: [0, 110500]
  vehicle_profile: SAAB 9-3 ME9.6 field car (VIN YS3FH46U681101367 — "1367")
  install_id: 02a66883-c578-4603-9f7e-3e46768a8e09  # OpenSAAB Collector install
status: partially captured (12 ECUs responded; 8 silent)
services:
  - 0x1A  # ReadEcuIdentification (GMW3110 §10.3)

# DIDs to probe per ECU. Tech2Win uses these consistently across modules.
# Each is a single $1A request; positive responses come back as $5A <DID> <payload>.
dids:
  0x81:
    name: ecu_id_short
    interpretation: |
      Short ECU identification string. Some modules return an ASCII tag
      (e.g. $065D returns "1A9"); others return a binary part-number stub.
  0x82:
    name: ecu_id_alt
    interpretation: "Alternate identifier slot — not always populated."
  0x90:
    name: vin
    interpretation: |
      17-character ASCII VIN. EVERY module that answers $1A 90 returns the
      same VIN — confirms gateway-wide consistency. On this capture all 12
      responders returned YS3FH46U681101367.
  0x9A:
    name: ecu_type_signature
    interpretation: |
      4-byte ECU type/SW signature. Trionic uses this byte pattern to
      fingerprint module family. First two bytes appear to be hardware
      class, last two software/calibration revision.

# Bench-observed responses on the 1367 ME9.6 field car (VIN YS3FH46U681101367).
# Each entry is the RESPONDER CAN-ID (i.e. the ID the ECU answered on).
responders:
  $0641:
    inferred_module: "engine ECM functional reply (T8 alias path; ME9.6 doesn't populate)"
    dids_observed: {0x90: "5A 90 <VIN>"}

  $0642:
    inferred_module: "BCM (Body Control Module)"
    dids_observed:
      0x07: "5A 07 87 83 42"
      0x08: "5A 08 6F"
      0x26: "5A 26 00 00"
      0x90: "5A 90 <VIN>"
      0x9A: "5A 9A 01 0E"
    notes: "DID 9A = 01 0E. Match against Trionic's BCM signature when wired."

  $0643:
    inferred_module: "Door module (DDM driver-side; same hardware as $0648)"
    dids_observed:
      0x01: "5A 01 C9 34"
      0x90: "5A 90 <VIN>"
    notes: "DID 01 = C9 34 — identical to $0648, so same hardware revision on both doors."

  $0645:
    inferred_module: "ACC / Heated Seats / Climate (per z90 DTC attribution)"
    dids_observed:
      0x42: "5A 42 08 60 00 1C 02 58 00 00 00 00 FF E2 00 00 FF E2 00 00 FF FF 00 00 FF E2 00 00 7E 00 00 00 00 00 72 00 00 00"
      0x90: "5A 90 <VIN>"
    notes: |
      DID 42 returns ~38-byte config block — looks like climate setpoints,
      vent positions, and seat heater config. Worth decoding separately.

  $0646:
    inferred_module: "TBD — rich responder (Jason Gaunt canonical: TO_SIC = Steering Integration Control)"
    confidence: medium  # was 'none' in 2026-05-13 map; now has multi-DID evidence
    dids_observed:
      0x02: "5A 02 1C A0 00"
      0x03: "5A 03 FF 40"
      0x90: "5A 90 <VIN>"
      0x9A: "5A 9A 04 09"
      0xB9: "5A B9 0F 00 00 00"
      0xBA: "5A BA 7C CF 35 50"
    notes: |
      Most DIDs of any body module here — populated, real ECU.
      DID BA (7C CF 35 50) and B9 (0F 00 00 00) look like calibration bytes.

  $0648:
    inferred_module: "Door module (DDM/PDM — same hardware as $0643)"
    dids_observed:
      0x01: "5A 01 C9 34"
      0x90: "5A 90 <VIN>"

  $0649:
    inferred_module: "TCS/ESP (per z90 DTC attribution)"
    dids_observed:
      0x90: "5A 90 <VIN>"
      0x9A: "5A 9A 01 05"

  $064A:
    inferred_module: "Door module (RLDM / RRDM)"
    dids_observed: {0x90: "5A 90 <VIN>"}

  $064B:
    inferred_module: "Door module (RLDM / RRDM)"
    dids_observed: {0x90: "5A 90 <VIN>"}

  $064F:
    inferred_module: "UEC (User Equipment Center / front lighting controller)"
    dids_observed:
      0x41: "5A 41 46 60 5A"
      0x90: "5A 90 <VIN>"
      0x9A: "5A 9A 01 04"
    notes: "DID 41 = 46 60 5A — three-byte tag (possibly ASCII 'F`Z' or hex part-number)."

  $065D:
    inferred_module: "TBD — confirmed ASCII '1A9' signature"
    confidence: medium  # was 'none'
    dids_observed:
      0x81: "5A 81 31 41 39"           # ASCII "1A9"
      0xB2: "5A B2 A1 00 00 00 00 00"
    notes: |
      DID 81 returns ASCII "1A9". Matches the pre-existing note in
      docs/saab_ecu_address_map_2026-05-13.md. ASCII identity but no
      DTCs to cross-reference — needs Tech2Win module-description
      screen to label.

  $07E8:
    inferred_module: "Engine ECM ME9.6 (OBD-II physical)"
    dids_observed:
      0x90: "5A 90 <VIN>"
      0x9A: "5A 9A 03 0A"

silent_targets:
  description: |
    Request CAN-IDs that Tech2Win queried in this capture but received
    NO $1A response. Worth re-querying explicitly on the bench.
  ids: [$0244, $0247, $024D, $0253, $0257, $025B, $025F, $0657]
  next_step: |
    Replay this YAML against just these silent IDs on the bench. If they
    still don't reply, they're either unpopulated on the 1367 platform or
    require a session-precondition we haven't sent.

notes: |
  - Tech2Win does not run a "pure" $1A sweep — it embeds these reads inside
    its other menus (Check Codes, Module Programming, Vehicle Identification).
    This YAML synthesises a standalone sweep so a future replay can fingerprint
    every module without running a full diagnostic session.
  - The 1367 (ME9.6) bench answers 12 modules. The 2017 (T8) bench may answer
    a different set — particularly $0241 functional should populate on T8.
