menu: "Diagnostic → Powertrain → Engine (ME9.6) → Read Codes"
target_ecu: $07E0/$07E8 (OBD-II) with DTC SF replies on $05E8
captured_from:
  shim_log: cstech2win_shim_20260513-115320.log
  range_ms: [92400, 92800]
  vehicle_profile: SAAB 9-3 (field car, 2009-2011 ME9.6, VIN prefix YS3FH46U…)
status: captured (22 DTCs returned in one frame burst)
services:
  - 0xA9  # ReadDiagnosticInformation (GMW3110 §9)
    # subfunction:
    #   0x81  ReadStatusOfDTCByStatusMask
    # mask observed:
    #   0x0C  (status & (pending | test_passed_since_clear)) — wider than
    #         the body-bus "Check Codes" 0x10/0x12; pulls back history.

steps:
  - step: request_dtcs
    tx: [0xA9, 0x81, 0x0C]
    can_id: $07E0
    rx:
      can_id: $05E8                # OBD-II single-frame DTC reply address
      frame_format:
        byte_0: 0x81               # subfunction echo
        bytes_1_3: dtc_code
        byte_4: status_mask
        bytes_5_7: 00 00 00
      delivery: "ME9.6 streams one SF per DTC at ~10ms cadence. No
                 responsePending observed on $07E8 — engine ECM replies
                 immediately."
      terminator: "81 00 00 00 FF 00 00 00"
    timeout_ms: 1500

# All 22 frames captured from this single request. Status byte interpretation
# follows GMW3110 §9.3 — see commands/saab/check_codes_read_dtcs.yaml#status_bits.
