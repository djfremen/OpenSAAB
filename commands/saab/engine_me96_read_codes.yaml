dtc_byte_layout: |
  Same algorithm as check_codes_read_dtcs.yaml — transcribed from
  Trionic8.cs:GetDtcDescription:

    byte 1 bits 7-6  →  letter      (0=P, 1=C, 2=B, 3=U)
    byte 1 bits 5-4  →  digit_2     (decimal 0-3)
    byte 1 bits 3-0  →  digit_3     (hex 0-F)
    byte 2 high nib  →  digit_4     (hex 0-F)
    byte 2 low nib   →  digit_5     (hex 0-F)
    byte 3           →  failureType (printed as 2-digit hex suffix)

  Worked examples (this capture):
    `04 20 00` → (0,0,4,2,0)+0x00 → P0420-00  (catalyst efficiency)
    `C1 22 00` → (3,0,1,2,2)+0x00 → U0122-00  (NOT C1122 — high 2 bits of
                                              byte 1 = 0xC0 >> 6 = 3 = 'U')
    `21 96 00` → (0,2,1,9,6)+0x00 → P2196-00  (O2 sensor stuck)

  Decoder script: tools/decode_gmw3110_dtc.py.

addressing_split: |
  ME9.6 engine ECU uses OBD-II standardised addressing, distinct from the
  SAAB manufacturer-alias range ($024X / $054X / $064X) used by body modules
  and the T8 engine in check_codes_read_dtcs.yaml:

    Request:        $07E0
    SF DTC reply:   $05E8     ← used here
    Diag reply:     $07E8     ← used for NRC / MF reads

  This is the same split-reply pattern as the SAAB aliases but on the
  OBD-II side. Per Trionic's `FilterIdECU = { 0x7E0, 0x7E8, 0x5E8 }`.

contrast_with_check_codes_yaml: |
  - check_codes_read_dtcs.yaml is the bus-wide "Check Codes" menu — sweeps
    every ECU with masks 0x10/0x12.
  - This entry is a SINGLE-ECU read with mask 0x0C, surfacing pending and
    just-cleared DTCs that the bus sweep wouldn't show.
  - No `20` (ReturnToNormalOperation) preamble in this single-ECU request —
    Tech2Win assumes the session is already in default state for this
    menu, unlike the bus-wide Check Codes flow which resets each ECU.

notes: |
  - This is a *dirty* engine — 21 unique DTCs returned. Most have status
    0x25 = (testNotPassedSinceCurrentPowerUp | testNotPassedSinceDTCCleared
    | DTCSupportedByCalibration). Codes are stored and were re-tested
    (and failed) on the current power cycle.
  - Two frames carry `C1 55 00` U0155-00 — most likely two distinct
    historical entries the ECM exposes separately, not a shim duplicate.
  - `P0411` (secondary air system) carries status 0xBF — every bit set
    including `warningIndicatorRequestedState`. That's the only DTC
    actively requesting MIL in this snapshot.
  - DTC names decoded via Trionic's algorithm; failure-mode (sub-byte 3)
    interpretation per SAE J2012 — best-effort labels in `note:` field.
  - U-codes (U0001, U0122, U0155, U0212) all indicate lost-comm with
    other modules — consistent with the ME9.6 having seen a bus dropout
    or modules being offline at some point.

open_questions:
  - Why mask 0x0C here specifically? Tech2Win could read 0x10 (confirmed)
    instead. Possibly the ME9.6 menu surfaces pending / transient DTCs
    where the body-module sweep doesn't.
  - The duplicate `C1 22 00` (once at status 0x19, once at 0x3F) — is
    that one DTC re-reported, or two separate stored failures sharing
    the same code?
  - Whether OBD-II $07E0 supports the same mask family (0x10/0x12) the
    SAAB body bus does, or whether ME9.6 uses a different mask set.
