  symptom: "Symptom: Lock/unlock with remote control not working"
  fault_symptom: Lock/unlock with remote control not working
  type_of_diagnosis: Diagnostics carried out when the button is depressed.
  enable_criteria: Control module is active.
  fault_criteria: Code sent from remote control does not correspond to code stored in CIM.
  system_reaction: None
  diagnostic_tool_functions: |
    Test value:
    
    Remote Last Range Status
    
    Remote Battery Status
    
    Remote Last Number
    
