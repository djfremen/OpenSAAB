  diagnostic_help: |
    A DTC is generated if the remote control battery is flat and after changing battery.
    
    Pressing the remote control 5 times outside its operating range after changing the battery will generate a fault code. If the car is locked at this time, you will have to unlock it manually and subsequently insert the key into the ignition lock to reprogram the key.
