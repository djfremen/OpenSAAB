  symptom: |
    Symptom: ABS warning lamp on
    Message appears in display.
    Steering column lock not working.
  fault_symptom: |
    ABS warning lamp on
    
    Message appears in display.
    
    Steering column lock not working.
  type_of_diagnosis: Continuous
  enable_criteria: Ignition ON.
  fault_criteria: |
    Control module receives substantial differences in speed from the four wheel sensors.
    
    •If one of the four wheel sensors display a value under 1.5 km/h and the other sensors display a value greater than 6 km/h for 3 seconds.
    
    •If two of the four wheel sensors display a value under 1.5 km/h and the other sensors display a value greater than 6 km/h for 10 seconds.
    
    •If three of the four wheel sensors show a value under 1.5 km/h and the other sensors show a value greater than 6 km/h for 120 seconds.
  system_reaction: |
    No ABS function
    
    No TCS/ESP function
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: Electrical fault in connecting leads or component.
