dtc: P0196-FA
module: PSG16
module_long_name: PSG16 Diesel Pump Control
description: Oil Temperature Sensor Circuit Malfunction.

wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/psg16/p0196-fa
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: Oil Temperature Sensor Circuit Malfunction.
  description: Oil Temperature Sensor Circuit Malfunction.
  symptom: "Symptom: Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  fault_symptom: "Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  type_of_diagnosis: Continuous
  enable_criteria: |
    Ignition ON.
    
    Engine running.
    
    NONE of the following DTCs must be detected:
    
    P0116, P0117, P0118
    
    P0197, P0198
  fault_criteria: The oil temperature has not exceeded 50°C within 5 minutes after the coolant temperature has exceeded 85°C for more than 5 seconds.
  system_reaction: |
    The control module uses 100°C as a substitute value.
    
    Control module deactivates diagnostics for the following DTC:
    
    P0116, P0117, P0118
    
    P0197, P0198
  checking_wiring: |
    •Faults in the control module female connector can be the cause of the DTC. Check the connector with respect to oxidation, depressed pins and pin clamping force.
    
    •Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force.
  diagnostic_tool_functions: |
    Test value:
    
    Coolant Temperature
    
    Coolant Temperature Sensor
    
    Oil Temperature Sensor
    
    (See also description of readings/activations in diagnostic tool)
