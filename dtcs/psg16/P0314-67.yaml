  diagnostic_help: |
    All causes for misfiring can cause DTC generation, e.g. combustion deviation in one of the cylinders.
    
    This may be due to:
    
    •Clogged nozzles.
    
    •Leaking high-pressure lines.
    
    •Damaged piston, cylinder or valve.
    
    •Mechanical fault in the engine.
    
    •Blocked or leaking fuel bridges.
    
    •Air in fuel system.
    
    •Poor fuel quality.
    
    •Water in fuel
    
    •Refuelled with petrol.
    
    •Fuel filter clogged.
    
    •Damaged sealing washers to injectors.
