    P0642, P0643
    
    P0652, P0653
    
    P2100, P2102, P2103
  fault_criteria: |
    Current EGR flow below requested EGR flow.
    
    DTC limit between 150 - 300 mg air/combustion depending on the difference between fuel/combustion and rpm.
