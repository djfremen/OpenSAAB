dtc: P0661-02
module: PSG16
module_long_name: PSG16 Diesel Pump Control
description: Swirl Control Valve Circuit. Short to Ground.

wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/psg16/p0661-02
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: Swirl Control Valve Circuit. Short to Ground.
  description: Swirl Control Valve Circuit. Short to Ground.
  symptom: "Symptom: Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  fault_symptom: "Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  type_of_diagnosis: Continuous
  enable_criteria: Ignition ON.
  fault_criteria: Output short circuit to ground for more than 0.6 s.
  system_reaction: |
    Control module uses 100% PWM signal as substitute value for EGR control.
    
    Substitute value for shut-off damper, motor set to 0% PWM signal.
  checking_wiring: |
    •Faults in the control module female connector can be the cause of the DTC. Check the connector with respect to oxidation, depressed pins and pin clamping force.
    
    •Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force.
  diagnostic_help: |
    The DTC indicates an electrical fault in the swirl throttle circuit. A mechanical fault may be indicated with a loss of power over 3500 rpm if the throttle has fastened in closed position. If the throttle is always open, fuel consumption can increase.
    
    EGR turned off in case of fault.
    
    Shut-off damper, motor not working.
