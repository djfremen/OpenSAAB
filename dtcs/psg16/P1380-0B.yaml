description: "Glow Control Unit Feedback Circuit, Short to B+"

wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/psg16/p1380-0b
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: "Glow Control Unit Feedback Circuit, Short to B+"
  description: "Glow Control Unit Feedback Circuit, Short to B+"
  symptom: "Symptom: Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  fault_symptom: "Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  type_of_diagnosis: Continuous
  enable_criteria: |
    Ignition ON.
    
    NONE of the following DTCs must be detected:
    
    P0116, P0117, P0118
  fault_criteria: Data link has same status (high/low) as activation lead.
  system_reaction: -
  checking_wiring: |
    •Faults in the control module female connector can be the cause of the DTC. Check the connector with respect to oxidation, depressed pins and pin clamping force.
    
    •Jiggle the wiring harness at several points to detect intermittent breaks or short circuits. Check also the connector for oxidation or loose pins.
  diagnostic_help: |
    Data link from glow plug control module should switch high/low inversely to activation lead from PSG 16 to glow plug control module.
    
    Check the glowplug control module for component fault, power supply or grounding.
    
    Check the glow plugs and leads.
