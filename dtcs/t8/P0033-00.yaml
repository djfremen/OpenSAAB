wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/t8/p0033-00
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: "System Bypass, charge air control, malfunction"
  description: "System Bypass, charge air control, malfunction"
  symptom: |
    Symptom: Fault indicator lamp (for further information see WIS Fault diagnosis, general)
    Limp home
  fault_symptom: |
    Fault indicator lamp (for further information see WIS Fault diagnosis, general)
    
    Limp home
  type_of_diagnosis: Continuous
  enable_criteria: |
    Battery voltage must be between 11 - 16 V.
    
    NONE of the following DTCs must be detected:
    
    P0685, P0686, P0687
    
    Engine running.
    
    Engine speed less than 3500 rpm.
    
    Output to solenoid valve is inactive.
    
    The boost pressure should be more than the atmospheric pressure + 35kPa.
    
    Intake pressure should be less than or equal to 35 kPa.
    
    When the conditions are fulfilled, the values for boost pressure and air mass are stored for evaluation.
  fault_criteria: "When the average values for boost pressure and air mass exceed 1.3 kPa and 2.4 g/s, respectively."
  system_reaction: |
    Torque limited to max. 170Nm.
    
    Boost pressure adaption is blocked and reset.
    
    Boost pressure control is blocked.
    
    The system continues to function with a calculated air mass instead of the value from the mass air flow sensor.
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: |
    The vacuum section of the system and the function of the valve.
    
    •Tip!
    
    The by-pass function is checked when the accelerator pedal is rapidly released during moderate acceleration.
  diagnostic_tool_functions: |
    Test value:
    
    •Tachometer
    
    •Absolute pressure sensor, charge air
    
    •Manifold absolute pressure sensor
    
    •Air Mass
    
    •Atmospheric Pressure
    
    •Charge Air Bypass Valve
    
    Activation:
    
    •Charge Air Bypass Valve
    
    (See also description of readings/activations in diagnostic tool)
