  url: https://saabwisonline.com/9-3-9440/2003/dtcs/t8/p0119-00
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: Engine Coolant Temperature Circuit Problem
  description: Engine Coolant Temperature Circuit Problem
  symptom: |
    Symptom: Fault indicator lamp (for further information see WIS Fault diagnosis, general)
    Incorrect temperature gauge reading.
  fault_symptom: |
    Fault indicator lamp (for further information see WIS Fault diagnosis, general)
    
    Incorrect temperature gauge reading.
  type_of_diagnosis: Continuous
  enable_criteria: |
    Engine running.
    
    NONE of the following DTCs must be detected:
    
    P0117, P0118
  fault_criteria: "The control module stores 5 consecutive measurements that differ more than 5°C from the directly preceding measurement. The average of the 5 measurements is calculated. If the average exceeds 10°C, a DTC is generated. A DTC is also generated if 2 consecutive measurements differ by more than 60°C."
  system_reaction: Radiator fan runs continuously.
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: Electrical fault in connecting leads or in the component (mainly poor contact).
  diagnostic_tool_functions: |
    Test value:
    
    •Engine Temperature
    
    (See also description of readings/activations in diagnostic tool)
