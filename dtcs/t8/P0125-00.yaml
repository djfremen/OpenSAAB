dtc: P0125-00
module: T8
module_long_name: Trionic 8 (T8) ECM
description: Excessive Time to Enter Closed Loop Fuel Control.

wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/t8/p0125-00
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: Excessive Time to Enter Closed Loop Fuel Control.
  description: Excessive Time to Enter Closed Loop Fuel Control.
  symptom: "Symptom: Malfunction Indicator Lamp"
  fault_symptom: Malfunction Indicator Lamp
  type_of_diagnosis: Once per driving cycle.
  enable_criteria: |
    Tests 1, 2 and 3.
    
    •Engine running.
    
    •A counter accumulates one value for each second which has passed since the engine started (with depressed accelerator pedal, the value is 1 and 0.5 with released accelerator pedal).
    
    •Start temperature for intake air and coolant have been registered and the lowest of these has been selected.
  fault_criteria: |
    Test 1
    
    •When the start temperature value is below -7°C, the counter reaches 600 before closed loop starts.
    
    Test 2
    
    •When the start temperature value is between -7°C and 10°C, the counter reaches 300 before closed loop starts.
    
    Test 3
    
    •When the start temperature value exceeds 10°C, the counter reaches 120 before closed loop starts.
  system_reaction: None
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnostic_tool_functions: |
    Test value:
    
    •Engine Coolant Temperature
    
    •O2S 1
    
    •Short Term Fuel Trim
    
    •Short Term Fuel Trim Status
    
    (See also description of readings/activations in diagnostic tool)
