wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/t8/p0138-00
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: O2S Circuit. High Voltage. Sensor 2.
  description: O2S Circuit. High Voltage. Sensor 2.
  symptom: "Symptom: Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  fault_symptom: "Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  type_of_diagnosis: Continuous
  enable_criteria: |
    Battery voltage must be between 11 - 16 V.
    
    Engine running.
    
    Preheating active for more than 4 s.
    
    Secondary air pump not active, if fitted.
    
    EVAP, leak diagnosis inactive (if OBD II).
  fault_criteria: When voltage across the sensor is more than 1200 mV for 5 s.
  system_reaction: |
    Preheating is switched off.
    
    Adaption of rear oxygen sensor is blocked and reset.
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: |
    Electrical fault in connecting leads or component.
    
    IMPORTANT
    
    •If the control module part number is 55354002 for B202E/L or 55354562 for B207R, the module should be updated to the latest software since these parts can incorrectly generate a DTC. If the part number is later than the numbers indicated, perform the normal fault diagnosis. The DTC can remain after SPS programming if the fault is genuine.
  diagnostic_tool_functions: |
    Test value:
    
    •O2S 2
    
    (See also description of readings/activations in diagnostic tool)
