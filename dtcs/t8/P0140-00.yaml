  index_description: O2S Circuit. No Activity Detected. Sensor 2.
  description: O2S Circuit. No Activity Detected. Sensor 2.
  symptom: "Symptom: Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  fault_symptom: "Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  type_of_diagnosis: Continuous
  enable_criteria: |
    Battery voltage must be between 11 - 16 V.
    
    Engine running.
    
    Preheating active for more than 4 s.
    
    Lambda control active for more then 5 s.
    
    Fuel shut-off for more than 7 s.
  fault_criteria: When voltage across sensor has not been below 400mV after a 7 second fuel shut-off.
  system_reaction: |
    Preheating is switched off.
    
    Adaption of rear oxygen sensor is blocked and reset.
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: |
    Worn/sluggish/contaminated oxygen sensor.
    
    The voltage across a defective sensor is 0.40V - 0.50V. OK if it exceeds 0.55V.
  diagnostic_tool_functions: |
    Test value:
    
    •O2S 2
    
    (See also description of readings/activations in diagnostic tool)
