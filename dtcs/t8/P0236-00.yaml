dtc: P0236-00
module: T8
module_long_name: Trionic 8 (T8) ECM
description: Charge Air Absolute Pressure Sensor Circuit. Performance Problem.

wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/t8/p0236-00
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: Charge Air Absolute Pressure Sensor Circuit. Performance Problem.
  description: Charge Air Absolute Pressure Sensor Circuit. Performance Problem.
  symptom: "Symptom: Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  fault_symptom: "Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  type_of_diagnosis: Continuous
  enable_criteria: |
    Battery voltage must be between 11 - 16 V.
    
    NONE of the following DTCs must be detected: P0107, P0108, P0237, P0238, P2228 and P2229.
    
    Ignition ON.
    
    Vehicle speed 0 km/h.
    
    Engine speed 0 rpm.
    
    The conditions above must be fulfilled for more than 3 s, after which the engine must be running for the diagnosis to finally run.
  fault_criteria: Absolute pressure sensor value differs more than 12 kPa from atmospheric pressure sensor and manifold absolute pressure sensor.
  system_reaction: |
    Torque limited to max. 140 Nm.
    
    Boost pressure adaption blocked.
    
    The control module uses a substitute value that is a function of atmospheric pressure, engine speed and damper area.
  diagnosis_regards: |
    Electrical fault in connecting leads or component.
    
    The signal is compared with the other pressure sensors when the ignition is on and the engine not started. The value must be close to the other values.
  diagnostic_tool_functions: |
    Test value:
    
    •Absolute pressure sensor, charge air
    
    •Manifold absolute pressure sensor
    
    •Atmosphere Absoslute Pressure
    
    (See also description of readings/activations in diagnostic tool)
