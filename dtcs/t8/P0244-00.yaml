description: Charge air control malfunction

wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/t8/p0244-00
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: Charge air control malfunction
  description: Charge air control malfunction
  symptom: |
    Symptom: Fault indicator lamp (for further information see WIS Fault diagnosis, general)
    Limp home
  fault_symptom: |
    Fault indicator lamp (for further information see WIS Fault diagnosis, general)
    
    Limp home
  type_of_diagnosis: Continuous
  enable_criteria: |
    General conditions for this DTC
    
    Engine temperature above -7°C.
    
    Lowest atmospheric pressure 72 kPa.
    
    NONE of the following DTCs must be detected:
    
    P0245, P0246
    
    Test 1
    
    •Engine running.
    
    Test 2
    
    •Engine temperature over 71°C.
    
    •Engine speed more than 1900 rpm.
    
    •Charge air pressure more than current atmospheric pressure + 39 kPa.
    
    •Throttle position 10% - 50%.
  fault_criteria: |
    Test 1
    
    •When the air mass is 250 mg/C higher than the requested value.
    
    Test 2
    
    •When the actual boost pressure is 20 to 25 kPa higher than requested.
  system_reaction: Torque limited to max. 170Nm.
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: |
    Turbo system fault causing high boost pressure.
    
    ____________________________________
    
    IMPORTANT
    
    •If the control module part number is 55354002 for B202E/L or 55354562 for B207R, the module should be updated to the latest software since these parts can incorrectly generate a DTC. If the part number is later than the numbers indicated, perform the normal fault diagnosis. The DTC can remain after SPS programming if the fault is genuine.
    
    ____________________________________
    
    A check to ensure that the boost pressure is not excessive is made when the engine load is moderate and constant.
  diagnostic_tool_functions: |
