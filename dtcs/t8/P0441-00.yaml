description: EVAP Purge Valve. Malfunction.

wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/t8/p0441-00
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: EVAP Purge Valve. Malfunction.
  description: EVAP Purge Valve. Malfunction.
  symptom: "Symptom: Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  fault_symptom: "Fault indicator lamp (for further information see WIS Fault diagnosis, general)"
  type_of_diagnosis: Once per driving cycle. Stopped when fault criteria are fulfilled or OK reported.
  enable_criteria: |
    Battery voltage must be between 11 - 16 V.
    
    Engine running.
    
    Intake air temperature during start is between 5 and 40°C.
    
    The coolant temperature during start is between 5 and 40°C.
    
    The difference between atmospheric pressure and intake pressure is above 15 kPa.
    
    Purge active.
    
    Shut-off valve and EVAP canister purge valve are closed, tank pressure is registered for a duration of 3 s.
    
    NONE of the following DTCs must be detected:
    
    •P0117, P0118
    
    •P0444, P0445
    
    •P0451, P0452, P0453
    
    •P0498, P0499
    
    •P0501
    
    •P0685, P0686, P0687
  fault_criteria: Excessive drop in tank pressure for 3 s.
  system_reaction: |
    No fuel shut-off.
    
    Fuel adaption is blocked and reset.
    
    EVAP canister purge valve deactivated.
  diagnosis_regards: Internal valve leakage.
  diagnostic_tool_functions: |
    Activation:
    
    EVAP Valve
    
    (See also description of readings/activations in diagnostic tool)
