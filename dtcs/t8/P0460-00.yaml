dtc: P0460-00
module: T8
module_long_name: Trionic 8 (T8) ECM
description: "Fuel Level Sensor Circuit, Performance Problem"

wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/t8/p0460-00
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: "Fuel Level Sensor Circuit, Performance Problem"
  description: "Fuel Level Sensor Circuit, Performance Problem"
  symptom: "Symptom: Incorrect display of fuel level"
  fault_symptom: Incorrect display of fuel level
  type_of_diagnosis: Continuous
  enable_criteria: |
    General conditions for this DTC
    
    •Battery voltage must be between 11 - 16 V.
    
    •Engine running.
    
    •NONE of the following DTCs must be detected:
    
    P0462, P0463
    
    Test 1
    
    •Fuel level between 2 - 53 litres.
    
    Test 2
    
    Fuel level over 53 litres.
  fault_criteria: |
    Test 1
    
    •No change of sensor value over a distance of 25 km.
    
    Test 2
    
    •No change of sensor value over a distance of 150 km.
  system_reaction: The control module uses a substitute value of 40 litres when fault is detected.
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: |
    Electrical fault in connecting leads or component.
    
    Sensor sticking mechanically.
    
    Fault in connector H42-2 is often a cause of this DTC.
  diagnostic_tool_functions: |
    Test value:
    
    •Fuel Level
    
    (See also description of readings/activations in diagnostic tool)
