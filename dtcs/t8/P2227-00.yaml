  fault_criteria: Atmospheric pressure sensor value differs more than 15 kPa from intake manifold absolute pressure sensor or 10 kPa from charge air absolute pressure sensor. The difference between both absolute pressure sensors may be max. 10 kPa.
  system_reaction: |
    Torque limited to max. 170Nm.
    
    Tank bleeding adaption is blocked and reset.
    
    Substitution value for atmospheric pressure = boost pressure value (before damper) upon start of engine.
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: Electrical fault in connecting leads or component.
