dtc: P0715-00
module: TCM
module_long_name: Transmission Control Module
description: Input RPM. No Signal.

wis:
  url: https://saabwisonline.com/9-3-9440/2003/dtcs/tcm/p0715-00
  fetched_at: 2026-05-18
  vehicle: 9-3 (9440) 2003
  index_description: Input RPM. No Signal.
  description: Input RPM. No Signal.
  type_of_diagnosis: Continuous
  enable_criteria: |
    Engine running.
    
    Exceptions:
    
    Limp home
    
    Output speed is less than or equal to:
    
    2nd gear, Output speed <= 207 rpm.
    
    3rd gear, Output speed <= 317 rpm.
    
    4th gear, Output speed <= 469 rpm.
    
    5th gear, Output speed <= 610 rpm.
  fault_criteria: |
    Control module receives no voltage from the input speed sensor.
    
    Control module receives no value from input speed sensor but receives value from the output speed sensor.
  system_reaction: |
    Change value for input speed to that of output speed.
    
    If the DTC remains during several test cycles:
    
    Limp home
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: Electrical fault in connecting leads or component.
