  description: Output RPM. No Signal.
  symptom: "Symptom: Message appears in display."
  fault_symptom: Message appears in display.
  type_of_diagnosis: Continuous
  enable_criteria: |
    Engine running and not in limp home mode.
    
    Exceptions:
    
    Reverse gear engaged.
    
    2nd or 3rd gear engaged.
  fault_criteria: |
    Control module receives no voltage from the output speed sensor.
    
    Control module receives no value from output speed sensor but receives value from the input speed sensor.
  system_reaction: |
    Control module uses speed value from the ABS system instead of the output speed sensor.
    
    If the DTC remains during several test cycles:
    
    Limp home
