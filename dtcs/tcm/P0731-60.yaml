  enable_criteria: |
    Engine running and not in limp home mode.
    
    •Exceptions:
    
    Output speed < 500 rpm.
    
    Output speed > 1260 rpm.
    
    Acceleration pedal position < 50 %.
    
    Engine speed does not increase for a duration of 1 second.
    
    Driver not driving in 1st gear.
    
    •Normal exceptions for shifting error DTC:
    
    Selector lever not in position D.
    
    During shifting.
    
    Oil temperature <= 20 º C
    
    Engine speed <400 rpm.
    
    Battery voltage < 10.5 Volt.
    
    Selector lever in R position.
    
    •Malfunction in one of the following systems:
    
    Input speed.
    
    Output speed.
    
    Gear selector position sensor 
    
    Gearbox Fluid Temperature Sensor
    
    Engine speed.
    
    ABS vehicle speed.
    
    Accelerator pedal position.
