  index_description: "Sentronic Circuit, Short to B+"
  description: "Sentronic Circuit, Short to B+"
  symptom: |
    Symptom: Message appears in display.
    No Sentronic function.
    Selector lever locked in position P or N.
  fault_symptom: |
    Message appears in display.
    
    No Sentronic function.
    
    Selector lever locked in position P or N.
  type_of_diagnosis: Continuous
  enable_criteria: |
    Engine running and not in limp home mode.
    
    System voltage should be 9 - 16 V.
  fault_criteria: Input voltage exceeds 6.7 +/- 0.8 V for more than 30 s.
  system_reaction: Manual shifting not permitted.
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: |
    Electrical fault in lead connected between SLM and TCM.
    
    ____________________________________
    
    IMPORTANT
    
    If this DTC is stored, DTC P1802 02 or P1802 05 should also be stored in SLM. Otherwise, it is an indication that SLM is not communicating on the I-bus.
    
    ____________________________________
    
    If the selector lever is moved to position M, SLM transmits a bus message. TCM is then open to up or downshifting. If the driver shifts manually, voltage is sent from pin 7 on SLM to pin 8 (A) on TCM. This is done through an analogue voltage signal sent by SLM on its own lead directly to TCM in accordance with the following:
    
    •Hold Gear voltage between 0.5 V - 1.4 V
    
    •Shift Gear -UP, (+) voltage between 1.4 V - 1.79 V
    
    •Shift Gear-DOWN (-) voltage between 2.7 V - 3.5 V
    
    (These voltage levels can be measured when all contacts are engaged.)
  diagnostic_tool_functions: |
    Test value:
    
    •Selector Position Sentronic
    
    •Selector Position Sentronic Up
    
    •Selector Position Sentronic Down
    
    •Shift Lever Sentronic
