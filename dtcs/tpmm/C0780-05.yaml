  symptom: "Symptom: Message appears in display."
  fault_symptom: Message appears in display.
  type_of_diagnosis: Continuous
  enable_criteria: Vehicle speed above 30 km/h for more than 30 seconds.
  fault_criteria: The signal detector is inactive during the entire programming procedure.
  system_reaction: The control module stores the most recently received transfer and uses it for continued functionality.
  checking_wiring: "Move the wiring harness at several spots and in several directions to reveal intermittent breaks and short-circuits. Check switches, connectors and crimp connections for oxidation, retracted pins and pin clamping force."
  diagnosis_regards: |
    •The diagnostic trouble code can be generated if tyres that block radio waves to the radio receiver are mounted. The radio waves are especially hindered by thick cord tyres.
    
    •In case of a fault, the control module may need up to 10 minutes in an active state before it can diagnose the fault.
    
    •Electrical fault in connecting leads or component.
